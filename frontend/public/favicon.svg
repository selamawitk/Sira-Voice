<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2BB8B8"/>
      <stop offset="100%" stop-color="#1a7a7a"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="40" height="40" rx="10" ry="10" fill="url(#g)">
    <animate attributeName="rx" values="10;14;10" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="10;14;10" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="24" y="31" text-anchor="middle" font-size="26" font-weight="bold" fill="#fff" font-family="Arial">S</text>
  <circle cx="24" cy="24" r="22" fill="none" stroke="#fff" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4">
    <animate attributeName="stroke-dashoffset" values="0;100" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
