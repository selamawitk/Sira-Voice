<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sira - Offline</title>
  <meta name="theme-color" content="#1A2E35" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1A2E35;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      padding: 24px;
      text-align: center;
    }
    .container { max-width: 360px; }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: rgba(43, 184, 184, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg { width: 32px; height: 32px; }
    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #2BB8B8;
      margin-bottom: 8px;
    }
    p {
      color: rgba(255,255,255,0.5);
      font-size: 0.875rem;
      line-height: 1.5;
      margin-bottom: 32px;
    }
    button {
      background: #2BB8B8;
      color: #1A2E35;
      border: none;
      padding: 12px 32px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 0.875rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.97); }
    .hint {
      margin-top: 24px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#2BB8B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.4 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Connect to the internet to continue using Sira. Your cached data is still available when you reconnect.</p>
    <button onclick="location.reload()">Try Again</button>
    <p class="hint">Sira will work again once you're back online</p>
  </div>
</body>
</html>
